services:
  - type: web
    name: llm-api-relay
    runtime: node
    plan: free
    buildCommand: npm ci --production
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: API_KEYS
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "120"
      - key: MAX_RETRIES
        value: "3"
      - key: REQUEST_TIMEOUT_MS
        value: "120000"
      - key: HEALTH_CHECK_INTERVAL_MS
        value: "60000"
      - key: MAX_LOG_ENTRIES
        value: "2000"
      - key: PROVIDERS
        value: "openrouter-free|https://openrouter.ai/api/v1|YOUR_KEY|10|true"
      - key: PROVIDERS_2
        value: "groq|https://api.groq.com/openai/v1|YOUR_KEY|8|true"
      - key: PROVIDERS_3
        value: "cerebras|https://api.cerebras.ai/v1|YOUR_KEY|7|true"
      - key: PROVIDERS_4
        value: "sambanova|https://api.sambanova.ai/v1|YOUR_KEY|6|true"
      - key: PROVIDERS_5
        value: "google-ai|https://generativelanguage.googleapis.com/v1beta/openai|YOUR_KEY|5|true"
      - key: PROVIDERS_6
        value: "mistral|https://api.mistral.ai/v1|YOUR_KEY|5|true"
      - key: PROVIDERS_7
        value: "github-models|https://models.inference.ai.azure.com|YOUR_TOKEN|4|true"
      - key: PROVIDERS_8
        value: "nvidia-nim|https://integrate.api.nvidia.com/v1|YOUR_KEY|4|true"
      - key: PROVIDERS_9
        value: "cohere|https://api.cohere.com/compatibility/v1|YOUR_KEY|3|true"
