services:
  llm-relay:
    build: .
    container_name: llm-api-relay
    restart: always
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - relay-net

  nginx:
    image: nginx:alpine
    container_name: llm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      llm-relay:
        condition: service_healthy
    networks:
      - relay-net

volumes:
  nginx-logs:

networks:
  relay-net:
    driver: bridge
