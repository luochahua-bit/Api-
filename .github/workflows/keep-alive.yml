name: Keep Render Alive

on:
  schedule:
    # Every 10 minutes (Render free tier sleeps after 15 min inactivity)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -s --max-time 10 https://llm-api-relay.onrender.com/health || echo "ping failed"
